services:
  trading-engine:
    build: .
    container_name: trading-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./sandbox:/app/sandbox
      - ./src/strategies:/app/src/strategies  # hot-reload
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import src.config; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
